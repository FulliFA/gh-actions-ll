# Deploy to AWS S3
#
# Triggered by:
#   - Build workflow completing on DEV (push to main or manual dispatch)
#   - Release published (PROD)
#
# Required repository secrets:
#   AWS_ACCESS_KEY      – IAM access key
#   AWS_SECRET_KEY  – Corresponding secret key

name: Deploy to S3

on:
  # Trigger when the Build workflow completes successfully
  workflow_run:
    workflows: [Build]
    types: [completed]

  # Trigger when a release is published (PROD)
  release:
    types: [published]

env:
  AWS_S3_BUCKET: gh-actions-example-387912402523-us-east-1-an      # ← change to your bucket name
  AWS_REGION: us-east-1               # ← change to your bucket's region

# Allow only one concurrent deployment
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run if: build succeeded (DEV) OR a release was published (PROD)
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'release'
    steps:
      # --- Resolve which artifact to download ---
      - name: Resolve artifact name (from Build)
        if: github.event_name == 'workflow_run'
        run: |
          echo "ARTIFACT_NAME=build-${{ github.event.workflow_run.run_number }}" >> "$GITHUB_ENV"
          echo "ARTIFACT_RUN_ID=${{ github.event.workflow_run.id }}" >> "$GITHUB_ENV"
          echo "Deploying DEV from build-${{ github.event.workflow_run.run_number }}"

      - name: Resolve artifact name (from Release)
        if: github.event_name == 'release'
        uses: actions/github-script@v7
        with:
          script: |
            // Find the most recent successful Build workflow run on the release tag
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build.yml',
              status: 'success',
              per_page: 1,
            });

            if (runs.data.workflow_runs.length === 0) {
              core.setFailed('No successful build found to deploy for this release.');
              return;
            }

            const run = runs.data.workflow_runs[0];
            core.exportVariable('ARTIFACT_NAME', `build-${run.run_number}`);
            core.exportVariable('ARTIFACT_RUN_ID', `${run.id}`);
            core.info(`Deploying PROD from build-${run.run_number} (run ${run.id})`);

      # --- Download the build artifact ---
      - name: Download build artifact
        uses: actions/download-artifact@v6
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/
          run-id: ${{ env.ARTIFACT_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # --- Deploy to S3 ---
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ env.AWS_S3_BUCKET }} \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "index.html"

          # Upload index.html with no-cache so users always get the latest
          aws s3 cp dist/index.html s3://${{ env.AWS_S3_BUCKET }}/index.html \
            --cache-control "no-cache"

      - name: Print site URL
        run: |
          TRIGGER="${{ github.event_name == 'release' && 'PROD' || 'DEV' }}"
          echo "🚀 [$TRIGGER] Deployed ${{ env.ARTIFACT_NAME }} to http://${{ env.AWS_S3_BUCKET }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com"
