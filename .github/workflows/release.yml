# Create a GitHub Release
#
# This workflow demonstrates repo-management automation.
# When you push a tag like v1.0.0, it automatically creates
# a GitHub Release with auto-generated release notes.
#
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0

name: Create Release

on:
  push:
    tags:
      - 'v*'   # Trigger on any tag starting with "v"

permissions:
  contents: write   # Needed to create releases

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history so release notes can diff commits

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              generate_release_notes: true,  // auto-generate notes from PRs/commits
              draft: false,
              prerelease: tag.includes('-')  // e.g. v1.0.0-beta is a pre-release
            });

            core.notice(`Release created: ${release.data.html_url}`);
